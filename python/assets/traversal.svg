<svg width="680" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .node-lbl { font-family: monospace; font-size: 12px; fill: #185FA5; }
      .node-sub { font-family: monospace; font-size: 11px; fill: #0F6E56; }
      .step-lbl { font-family: sans-serif; font-size: 11px; fill: #555; }
      .cmd { font-family: monospace; font-size: 11px; fill: #3B8BD4; }
      .title { font-family: sans-serif; font-size: 12px; font-weight: 500; fill: #666; }
      .foot { font-family: sans-serif; font-size: 10px; fill: #888; }
      @media (prefers-color-scheme: dark) {
        .step-lbl { fill: #aaa; }
        .title { fill: #aaa; }
        .foot { fill: #777; }
      }
      @keyframes fadeUp {
        from { opacity:0; transform: translateY(8px); }
        to   { opacity:1; transform: translateY(0); }
      }
      @keyframes dash {
        from { stroke-dashoffset: 40; opacity:0; }
        to   { stroke-dashoffset: 0; opacity:1; }
      }
      .tree-line { animation: dash 0.5s ease forwards; stroke-dasharray: 40; }
      .step-g    { animation: fadeUp .5s ease both; }
      .node-g    { animation: fadeUp .4s ease both; }
    </style>
    <marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="340" y="24" text-anchor="middle">Рекурсивный обход каталога — find / os.walk</text>

  <!-- ROOT -->
  <g class="node-g" style="animation-delay:.1s">
    <rect x="30" y="40" width="100" height="28" rx="6" fill="#185FA5" fill-opacity="0.12" stroke="#185FA5" stroke-width="0.8" stroke-opacity="0.4"/>
    <text class="node-lbl" x="80" y="59" text-anchor="middle" font-weight="500">📁 /texts</text>
  </g>

  <line class="tree-line" x1="56" y1="68" x2="56" y2="108" stroke="#aaa" stroke-width="1" style="animation-delay:.3s"/>
  <line class="tree-line" x1="56" y1="108" x2="70" y2="108" stroke="#aaa" stroke-width="1" style="animation-delay:.3s"/>
  <line class="tree-line" x1="56" y1="68" x2="56" y2="155" stroke="#aaa" stroke-width="1" style="animation-delay:.4s"/>
  <line class="tree-line" x1="56" y1="155" x2="70" y2="155" stroke="#aaa" stroke-width="1" style="animation-delay:.4s"/>

  <!-- SUB1 -->
  <g class="node-g" style="animation-delay:.5s">
    <rect x="70" y="94" width="100" height="28" rx="6" fill="#185FA5" fill-opacity="0.09" stroke="#185FA5" stroke-width="0.6" stroke-opacity="0.3"/>
    <text class="node-lbl" x="120" y="113" text-anchor="middle">📁 sub1</text>
  </g>

  <line class="tree-line" x1="96" y1="122" x2="96" y2="152" stroke="#aaa" stroke-width="1" style="animation-delay:.7s"/>
  <line class="tree-line" x1="96" y1="152" x2="110" y2="152" stroke="#aaa" stroke-width="1" style="animation-delay:.7s"/>

  <!-- a.txt -->
  <g class="node-g" style="animation-delay:.8s">
    <rect x="110" y="138" width="86" height="26" rx="5" fill="#0F6E56" fill-opacity="0.1" stroke="#0F6E56" stroke-width="0.6" stroke-opacity="0.4"/>
    <text class="node-sub" x="153" y="155" text-anchor="middle">📄 a.txt</text>
  </g>

  <!-- SUB2 -->
  <g class="node-g" style="animation-delay:.6s">
    <rect x="70" y="141" width="100" height="28" rx="6" fill="#185FA5" fill-opacity="0.09" stroke="#185FA5" stroke-width="0.6" stroke-opacity="0.3"/>
    <text class="node-lbl" x="120" y="160" text-anchor="middle">📁 sub2</text>
  </g>

  <line class="tree-line" x1="96" y1="169" x2="96" y2="196" stroke="#aaa" stroke-width="1" style="animation-delay:.9s"/>
  <line class="tree-line" x1="96" y1="196" x2="110" y2="196" stroke="#aaa" stroke-width="1" style="animation-delay:.9s"/>
  <line class="tree-line" x1="96" y1="169" x2="96" y2="232" stroke="#aaa" stroke-width="1" style="animation-delay:1.0s"/>
  <line class="tree-line" x1="96" y1="232" x2="110" y2="232" stroke="#aaa" stroke-width="1" style="animation-delay:1.0s"/>

  <!-- b.txt, c.txt -->
  <g class="node-g" style="animation-delay:1.0s">
    <rect x="110" y="182" width="86" height="26" rx="5" fill="#0F6E56" fill-opacity="0.1" stroke="#0F6E56" stroke-width="0.6" stroke-opacity="0.4"/>
    <text class="node-sub" x="153" y="199" text-anchor="middle">📄 b.txt</text>
  </g>
  <g class="node-g" style="animation-delay:1.1s">
    <rect x="110" y="218" width="86" height="26" rx="5" fill="#0F6E56" fill-opacity="0.1" stroke="#0F6E56" stroke-width="0.6" stroke-opacity="0.4"/>
    <text class="node-sub" x="153" y="235" text-anchor="middle">📄 c.txt</text>
  </g>

  <line x1="260" y1="36" x2="260" y2="256" stroke="#ddd" stroke-width="0.5"/>

  <!-- STEPS -->
  <g class="step-g" style="animation-delay:.2s">
    <rect x="278" y="40" width="28" height="28" rx="14" fill="#185FA5" fill-opacity="0.15"/>
    <text x="292" y="59" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#185FA5">1</text>
    <text class="step-lbl" x="318" y="52" font-weight="500">Найти все .txt файлы</text>
    <text class="cmd"       x="318" y="66">find /texts -type f -name "*.txt"</text>
  </g>

  <g class="step-g" style="animation-delay:.7s">
    <rect x="278" y="88" width="28" height="28" rx="14" fill="#0F6E56" fill-opacity="0.15"/>
    <text x="292" y="107" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#0F6E56">2</text>
    <text class="step-lbl" x="318" y="100" font-weight="500">Читать файл через stdin</text>
    <text class="cmd"       x="318" y="114">tr FROM TO &lt; file &gt; tmp</text>
  </g>

  <g class="step-g" style="animation-delay:1.2s">
    <rect x="278" y="136" width="28" height="28" rx="14" fill="#BA7517" fill-opacity="0.15"/>
    <text x="292" y="155" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#BA7517">3</text>
    <text class="step-lbl" x="318" y="148" font-weight="500">tr применяет сдвиг</text>
    <text class="cmd"       x="318" y="162" fill="#BA7517">hello  →  khoor</text>
  </g>

  <g class="step-g" style="animation-delay:1.7s">
    <rect x="278" y="184" width="28" height="28" rx="14" fill="#534AB7" fill-opacity="0.15"/>
    <text x="292" y="203" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#534AB7">4</text>
    <text class="step-lbl" x="318" y="196" font-weight="500">Заменить оригинал</text>
    <text class="cmd"       x="318" y="210" fill="#534AB7">mv tmp file  /  os.replace(tmp, file)</text>
  </g>

  <!-- Step connectors -->
  <line x1="292" y1="68"  x2="292" y2="88"  stroke="#ddd" stroke-width="1" style="animation:fadeUp .3s ease .5s both"/>
  <line x1="292" y1="116" x2="292" y2="136" stroke="#ddd" stroke-width="1" style="animation:fadeUp .3s ease 1.0s both"/>
  <line x1="292" y1="164" x2="292" y2="184" stroke="#ddd" stroke-width="1" style="animation:fadeUp .3s ease 1.5s both"/>

  <!-- Repeat loop -->
  <g style="animation:fadeUp .5s ease 2.2s both">
    <path d="M292 212 Q292 240 350 240 Q610 240 610 155 Q610 88 560 88" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar2)"/>
    <text class="foot" x="430" y="255" text-anchor="middle">повторить для каждого файла</text>
  </g>

  <line x1="30" y1="262" x2="650" y2="262" stroke="#ddd" stroke-width="0.5"/>
  <text class="foot" x="340" y="276" text-anchor="middle">Bash: find + while read  ·  Python: os.walk + subprocess.run(tr)</text>
</svg>
