<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caesar Cipher — Terminal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; }
  .term-wrap { background: #1a1a2e; border-radius: 12px; overflow: hidden; font-family: monospace; }
  .term-bar { background: #2d2d44; padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .term-body { padding: 20px 24px 24px; }
  .line { display: flex; align-items: baseline; min-height: 22px; margin-bottom: 4px; }
  .prompt { color: #5ccfe6; font-size: 13px; white-space: nowrap; }
  .cmd-text { color: #d4d4d4; font-size: 13px; }
  .out-dim { color: #777; font-size: 13px; }
  .out-enc { color: #ffd173; font-size: 13px; }
  .out-done { color: #a9dc76; font-size: 13px; }
  .cursor { display: inline-block; width: 8px; height: 14px; background: #5ccfe6; vertical-align: middle; animation: blink 1s step-end infinite; margin-left: 1px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .fade-in { animation: fi .3s ease forwards; }
  @keyframes fi { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="term-wrap">
  <div class="term-bar">
    <div class="dot" style="background:#ff5f57"></div>
    <div class="dot" style="background:#febc2e"></div>
    <div class="dot" style="background:#28c840"></div>
    <span style="color:#888;font-size:12px;margin-left:8px;font-family:monospace">caesar — bash</span>
  </div>
  <div class="term-body" id="term"></div>
</div>
<script>
const lines = [
  { delay: 300,  type: 'cmd',  text: './solution.sh -d ./texts -k 3' },
  { delay: 1100, type: 'out',  text: 'Encoding: ./texts/readme.txt' },
  { delay: 1500, type: 'out',  text: 'Encoding: ./texts/sub1/notes.txt' },
  { delay: 1900, type: 'out',  text: 'Encoding: ./texts/sub1/draft.txt' },
  { delay: 2300, type: 'out',  text: 'Encoding: ./texts/sub2/report.txt' },
  { delay: 2700, type: 'out',  text: 'Encoding: ./texts/sub2/data.txt' },
  { delay: 3100, type: 'done', text: 'Done. All .txt files encoded with key=3.' },
];
const term = document.getElementById('term');
const promptLine = document.createElement('div');
promptLine.className = 'line';
promptLine.innerHTML = '<span class="prompt">user@host:~$&nbsp;</span><span class="cmd-text" id="typing"></span><span class="cursor" id="cur"></span>';
term.appendChild(promptLine);
const typingEl = document.getElementById('typing');
const curEl = document.getElementById('cur');
const cmdText = lines[0].text;
let charIdx = 0;
function typeChar() {
  if (charIdx < cmdText.length) {
    typingEl.textContent += cmdText[charIdx++];
    setTimeout(typeChar, 38);
  } else {
    curEl.style.display = 'none';
    showOutputLines();
  }
}
setTimeout(typeChar, lines[0].delay);
function showOutputLines() {
  lines.slice(1).forEach((l) => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'line fade-in';
      if (l.type === 'out') {
        const parts = l.text.match(/^(Encoding: )(.+)$/);
        div.innerHTML = `<span class="out-dim">${parts[1]}</span><span class="out-enc">${parts[2]}</span>`;
      } else {
        div.innerHTML = `<span class="out-done">✓ ${l.text}</span>`;
      }
      term.appendChild(div);
    }, l.delay - lines[0].delay - cmdText.length * 38);
  });
}
</script>
</body>
</html>
